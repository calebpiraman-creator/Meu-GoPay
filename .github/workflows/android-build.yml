name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Dar permissão ao gradlew
        run: chmod +x ./gradlew

      - name: Gerar arquivo .env
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      - name: Remover linha problemática do build.gradle.kts
        run: |
          sed -i '/signingConfig = signingConfigs.getByName("debugConfig")/d' app/build.gradle.kts

      - name: Gerar APK debug
        run: ./gradlew assembleDebug

      - name: Enviar APK como arquivo para download
        uses: actions/upload-artifact@v4
        with:
          name: GoPay-APK
          path: app/build/outputs/apk/debug/app-debug.apk
